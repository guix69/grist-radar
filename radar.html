<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Chart — Grist Widget</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeede8;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --radius: 10px;
    --accent: #534AB7;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a28;
      --bg3: #333330;
      --text: #f0efe8;
      --text2: #9a9990;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --accent: #8f87e8;
    }
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  #toolbar label {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }

  #alphaSlider {
    width: 80px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  #alphaVal {
    font-size: 12px;
    color: var(--text2);
    min-width: 28px;
  }

  #colSelect {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    max-width: 180px;
  }

  #statusMsg {
    font-size: 11px;
    color: var(--text2);
    margin-left: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  /* ── LEGEND ── */
  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    min-height: 36px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text2);
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── CHART ── */
  #chartWrap {
    flex: 1;
    position: relative;
    padding: 12px 16px;
    overflow: hidden;
    min-height: 0; /* essentiel pour que flex:1 fonctionne dans un iframe */
  }

  /* ── EMPTY STATE ── */
  #emptyState {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 8px;
    color: var(--text2);
    font-size: 13px;
    padding: 40px;
    text-align: center;
  }

  #emptyState svg {
    opacity: 0.35;
  }

  .axis-check {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }
  .axis-check input[type=checkbox] {
    accent-color: var(--accent);
    width: 13px;
    height: 13px;
    cursor: pointer;
    margin: 0;
  }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <label for="colSelect">Filtrer par colonne :</label>
  <select id="colSelect">
    <option value="__none__">— Toutes les lignes —</option>
  </select>

  <label for="alphaSlider" style="margin-left:8px;">Opacité :</label>
  <input type="range" id="alphaSlider" min="0" max="50" value="15" step="1">
  <span id="alphaVal">15%</span>

  <span id="statusMsg">Connexion à Grist…</span>
  <span style="font-size:11px; font-family:monospace; color:var(--text2); background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:2px 7px; white-space:nowrap; margin-left:4px;">v<span id="versionBadge"></span></span>
</div>

<!-- AXES SELECTOR (visible uniquement hors Grist ou si pas de mapping) -->
<div id="axesBar" style="display:none; align-items:center; gap:8px; padding:7px 14px; background:var(--bg2); border-bottom:1px solid var(--border); flex-wrap:wrap;">
  <span style="font-size:12px; color:var(--text2); white-space:nowrap;">Axes du radar :</span>
  <div id="axesCheckboxes" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
</div>

<!-- LÉGENDE -->
<div id="legend"></div>

<!-- GRAPHIQUE -->
<div id="chartWrap">
  <canvas id="radarChart"
    role="img"
    aria-label="Graphique radar comparant plusieurs fournisseurs selon les critères tech, pro, coût, qualité et support.">
    Données fournisseurs comparées sur : tech, pro, coût, qualité, support.
  </canvas>
</div>

<!-- ÉTAT VIDE -->
<div id="emptyState">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/>
  </svg>
  <span>Aucune ligne à afficher.<br>Vérifiez le filtre ou activez des lignes dans la table.</span>
</div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIGURATION
   ═══════════════════════════════════════════════════ */
// Colonnes radar par défaut (fallback si pas de mapping Grist)
const DEFAULT_AXES = ['tech', 'pro', 'cout', 'qualite', 'support'];
// Colonne contenant le nom du fournisseur (fallback)
const NAME_COL = 'Fournisseur';

/* Palette couleurs (border + fill) */
const PALETTE = [
  '#534AB7','#0F6E56','#D85A30','#185FA5',
  '#993556','#3B6D11','#854F0B','#A32D2D',
  '#0C447C','#633806'
];

/* ═══════════════════════════════════════════════════
   ÉTAT
   ═══════════════════════════════════════════════════ */
const VERSION = '1.4.0';

let chart        = null;
let allRows      = [];   // toutes les lignes reçues de Grist (fields plats)
let filterCol    = '__none__'; // colonne booléenne de filtre
let knownCols    = [];   // toutes les colonnes disponibles
let activeAxes   = [...DEFAULT_AXES]; // axes actifs sur le radar
let nameCol      = NAME_COL;          // colonne nom active

/* ═══════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════ */
function hexAlpha(hex, pct) {
  return hex + Math.round(pct * 2.55).toString(16).padStart(2, '0');
}

function isDarkMode() {
  return matchMedia('(prefers-color-scheme: dark)').matches;
}

function getColors() {
  return isDarkMode()
    ? { grid: 'rgba(255,255,255,0.12)', tick: 'rgba(255,255,255,0.45)', label: '#c8c4f8' }
    : { grid: 'rgba(0,0,0,0.09)',       tick: 'rgba(0,0,0,0.40)',       label: '#3C3489' };
}

/* Filtrer les lignes selon la colonne booléenne choisie */
function filteredRows() {
  if (filterCol === '__none__') return allRows;
  return allRows.filter(row => {
    const v = row[filterCol];
    // Accepte true, 1, "1", "true", "oui", "yes"
    if (typeof v === 'boolean') return v;
    if (typeof v === 'number')  return v !== 0;
    if (typeof v === 'string')  return ['1','true','oui','yes','vrai'].includes(v.toLowerCase());
    return false;
  });
}

/* ═══════════════════════════════════════════════════
   SÉLECTEUR D'AXES (mode manuel, hors mapping Grist)
   ═══════════════════════════════════════════════════ */
function buildAxesBar(cols) {
  const bar  = document.getElementById('axesBar');
  const wrap = document.getElementById('axesCheckboxes');
  // Colonnes numériques candidates : toutes sauf nameCol, filterCol, id
  const excluded = new Set([nameCol, 'id']);
  const candidates = cols.filter(c => !excluded.has(c));

  if (candidates.length === 0) { bar.style.display = 'none'; return; }

  bar.style.display = 'flex';
  wrap.innerHTML = '';

  candidates.forEach(col => {
    const checked = activeAxes.includes(col);
    const lbl = document.createElement('label');
    lbl.className = 'axis-check';
    lbl.innerHTML = `<input type="checkbox" value="${col}" ${checked ? 'checked' : ''}><span>${col}</span>`;
    lbl.querySelector('input').addEventListener('change', () => {
      activeAxes = [...wrap.querySelectorAll('input:checked')].map(i => i.value);
      redraw();
    });
    wrap.appendChild(lbl);
  });
}

/* ═══════════════════════════════════════════════════
   SÉLECTEUR DE COLONNE DE FILTRE
   ═══════════════════════════════════════════════════ */
function populateColSelect(cols) {
  const sel = document.getElementById('colSelect');
  const prev = sel.value;

  sel.innerHTML = '<option value="__none__">— Toutes les lignes —</option>';

  // Toutes les colonnes sauf les axes numériques et le nom — y compris les colonnes vides
  const excluded = new Set([nameCol, 'id', ...activeAxes]);
  cols
    .filter(c => !excluded.has(c))
    .forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      sel.appendChild(opt);
    });

  // Restaurer la sélection précédente si elle existe encore
  if ([...sel.options].some(o => o.value === prev)) {
    sel.value = prev;
  } else {
    sel.value = '__none__';
    filterCol = '__none__';
  }
}

document.getElementById('colSelect').addEventListener('change', e => {
  filterCol = e.target.value;
  redraw();
});

/* ═══════════════════════════════════════════════════
   LÉGENDE
   ═══════════════════════════════════════════════════ */
function buildLegend(rows) {
  const el = document.getElementById('legend');
  el.innerHTML = rows.map((row, i) => {
    const color = PALETTE[i % PALETTE.length];
    const name  = row[nameCol] || `#${row.id || i+1}`;
    return `<span class="legend-item">
      <span class="legend-swatch" style="background:${color}"></span>
      <span>${name}</span>
    </span>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════
   GRAPHIQUE
   ═══════════════════════════════════════════════════ */
function redraw() {
  const rows   = filteredRows();
  const axes   = activeAxes.filter(k => k); // colonnes radar actives
  const labels = axes.map(k => k);          // labels = noms de colonnes
  const chartWrap  = document.getElementById('chartWrap');
  const emptyState = document.getElementById('emptyState');

  buildLegend(rows);

  if (rows.length === 0) {
    chartWrap.style.display  = 'none';
    emptyState.style.display = 'flex';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  chartWrap.style.display  = 'flex';
  emptyState.style.display = 'none';

  const alpha  = parseInt(document.getElementById('alphaSlider').value, 10);
  const colors = getColors();
  const maxVal = Math.max(1, ...rows.flatMap(r => AXES.map(k => Number(r[k]) || 0)));
  const sugMax = Math.ceil(maxVal * 1.15 / 5) * 5 || 10;
  const step   = Math.max(1, Math.round(sugMax / 5));

  const datasets = rows.map((row, i) => {
    const color = PALETTE[i % PALETTE.length];
    return {
      label:            row[nameCol] || `#${row.id || i+1}`,
      data:             axes.map(k => Number(row[k]) || 0),
      borderColor:      color,
      backgroundColor:  hexAlpha(color, alpha),
      borderWidth:      2,
      pointBackgroundColor: color,
      pointRadius:      4,
      pointHoverRadius: 6,
    };
  });

  const config = {
    type: 'radar',
    data: { labels: labels, datasets },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      animation:           { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label} : ${ctx.raw}` } }
      },
      scales: {
        r: {
          beginAtZero: true,
          suggestedMax: sugMax,
          grid:        { color: colors.grid },
          angleLines:  { color: colors.grid },
          ticks: {
            color:           colors.tick,
            backdropColor:   'transparent',
            font:            { size: 11 },
            stepSize:        step,
          },
          pointLabels: {
            color: colors.label,
            font:  { size: 13, weight: '500' },
          }
        }
      }
    }
  };

  if (chart) {
    chart.data    = config.data;
    chart.options = config.options;
    chart.update('none');
  } else {
    chart = new Chart(document.getElementById('radarChart'), config);
  }
}

/* ═══════════════════════════════════════════════════
   SLIDER OPACITÉ
   ═══════════════════════════════════════════════════ */
document.getElementById('alphaSlider').addEventListener('input', e => {
  document.getElementById('alphaVal').textContent = e.target.value + '%';
  if (!chart) return;
  const alpha = parseInt(e.target.value, 10);
  chart.data.datasets.forEach((ds, i) => {
    ds.backgroundColor = hexAlpha(PALETTE[i % PALETTE.length], alpha);
  });
  chart.update();
});

/* ═══════════════════════════════════════════════════
   RESPONSIVE — ResizeObserver
   ═══════════════════════════════════════════════════ */
(function() {
  const wrap = document.getElementById('chartWrap');
  // Resize le canvas pour qu'il remplisse exactement son conteneur
  function fitCanvas() {
    const canvas = document.getElementById('radarChart');
    if (!canvas) return;
    const w = wrap.clientWidth  - 32; // padding 16px x2
    const h = wrap.clientHeight - 24; // padding 12px x2
    if (w <= 0 || h <= 0) return;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    if (chart) chart.resize();
  }

  const ro = new ResizeObserver(() => fitCanvas());
  ro.observe(wrap);
  // Aussi écouter le resize de la fenêtre (fallback pour vieux navigateurs)
  window.addEventListener('resize', fitCanvas);
})();

/* ═══════════════════════════════════════════════════
   INTÉGRATION GRIST
   ═══════════════════════════════════════════════════ */
function setStatus(msg) {
  document.getElementById('versionBadge').textContent = VERSION;
  document.getElementById('statusMsg').textContent = msg;
}

if (typeof grist !== 'undefined') {
  setStatus('Connexion à Grist…');

  grist.ready({
    requiredAccess: 'read table',
    columns: [
      {
        name: 'label',
        title: 'Nom (étiquette)',
        optional: false,
        type: 'Text',
        description: 'Colonne contenant le nom affiché pour chaque fournisseur'
      },
      {
        name: 'axes',
        title: 'Axes du radar',
        optional: true,
        type: 'Numeric',
        allowMultiple: true,
        description: 'Colonnes numériques à afficher sur le radar (sélection multiple)'
      },
      {
        name: 'filter',
        title: 'Filtre (booléen)',
        optional: true,
        type: 'Bool',
        description: 'Colonne booléenne pour filtrer les lignes affichées'
      }
    ]
  });

  // Réception des données — se déclenche à chaque modification de la table
  grist.onRecords((records, mappings) => {
    if (!records || records.length === 0) {
      allRows = [];
      setStatus('Table vide.');
      redraw();
      return;
    }

    // Lire les mappings de colonnes configurés dans le panneau Grist
    if (mappings) {
      if (mappings.label)  nameCol = mappings.label;
      if (mappings.axes && mappings.axes.length > 0) {
        activeAxes = Array.isArray(mappings.axes) ? mappings.axes : [mappings.axes];
        document.getElementById('axesBar').style.display = 'none'; // géré par Grist
      }
      if (mappings.filter) filterCol = mappings.filter;
    }

    // Grist peut renvoyer les records sous deux formats :
    //   format A : { id, fields: { col: val, … } }
    //   format B : { id, col: val, … }  (fields directement à la racine)
    allRows = records.map(r => {
      if (r.fields && typeof r.fields === 'object') {
        return { id: r.id, ...r.fields };
      }
      const row = {};
      Object.keys(r).forEach(k => { row[k] = r[k]; });
      return row;
    });

    // Collecter TOUTES les clés présentes dans n'importe quelle ligne
    const colSet = new Set();
    allRows.forEach(r => Object.keys(r).forEach(k => colSet.add(k)));
    colSet.delete('id');
    const cols = [...colSet];

    knownCols = cols;
    populateColSelect(cols);

    // Si pas de mapping axes → afficher la barre de sélection manuelle
    if (!mappings || !mappings.axes || mappings.axes.length === 0) {
      // Initialiser activeAxes sur les colonnes numériques si c'est la première fois
      if (activeAxes.every(a => !cols.includes(a))) {
        activeAxes = cols.filter(c => {
          const excluded = new Set([nameCol, 'id', filterCol]);
          if (excluded.has(c)) return false;
          return allRows.some(r => typeof r[c] === 'number');
        });
      }
      buildAxesBar(cols);
    }

    setStatus(`${allRows.length} ligne(s) reçue(s).`);
    redraw();
  });

} else {
  /* ─── MODE DÉMO (hors Grist) ─── */
  setStatus('Mode démo — données d\'exemple.');
  allRows = [
    { id:1, Fournisseur:'AAAAAAAA',    tech:4, pro:5,  cout:4, qualite:3, support:2, Afficher: true  },
    { id:2, Fournisseur:'BBBBBBB',     tech:1, pro:6,  cout:3, qualite:4, support:5, Afficher: true  },
    { id:3, Fournisseur:'CCCCCCCC',    tech:9, pro:12, cout:7, qualite:2, support:5, Afficher: false },
    { id:4, Fournisseur:'EEEEEEEEEEE', tech:1, pro:6,  cout:3, qualite:4, support:5, Afficher: true  },
    { id:5, Fournisseur:'ZZZZZZZZZZ',  tech:9, pro:15, cout:1, qualite:7, support:3, Afficher: false },
  ];
  const cols = Object.keys(allRows[0]).filter(c => c !== 'id');
  knownCols = cols;
  populateColSelect(cols);
  buildAxesBar(cols);
  redraw();
}
</script>
</body>
</html>
